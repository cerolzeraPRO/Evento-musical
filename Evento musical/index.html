<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento Musical</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #222;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #333;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<header>
    <h1>Festival Musical 2026</h1>
    <p>Garanta já seu ingresso!</p>
</header>

<section>
    <h2>Apresentação</h2>
    <img src="https://via.placeholder.com/800x300" alt="Imagem do evento" width="100%">
    
    <video width="100%" controls>
        <source src="video.mp4" type="video/mp4">
        Seu navegador não suporta vídeo.
    </video>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>
</section>

<section>
    <h2>Horários dos Shows</h2>
    <table>
        <tr>
            <th>Horário</th>
            <th>Artista</th>
            <th>Palco</th>
        </tr>
        <tr>
            <td>18:00</td>
            <td>Gurizada da campo real</td>
            <td>Principal</td>
        </tr>
        <tr>
            <td>19:30</td>
            <td>DJ Calvum</td>
            <td>palco segundario</td>
